# RiskSensitiveEnv 实验配置文件
# 用于验证 QCPO 相比 QPO 在均值优化方面的优越性

# ======================
# 环境参数
# ======================
env_name: 'RiskSensitiveEnv'

# ======================
# 通用训练参数
# ======================
q_alpha: 0.25           # 分位数水平 (25th percentile)
gamma: 0.99             # 折扣因子
max_episode: 10000      # 最大训练轮数
est_interval: 100       # 滚动估计的窗口大小
log_interval: 100       # 日志记录间隔
init_std: 1.0           # 策略初始标准差

# ======================
# 学习率参数
# lr(k) = a / (b + k)^c
# ======================
# 策略网络学习率
theta_a: 0.7943         # (10000^0.9) * 1e-3
theta_b: 10000
theta_c: 0.9

# 分位数估计学习率
q_a: 2.512              # (10000^0.6) * 1e-2
q_b: 10000
q_c: 0.6

# ======================
# QCPO 特有参数
# ======================
outer_interval: 100     # 外层更新间隔（每多少个episode更新一次λ）
nu: 1.0                 # 约束惩罚系数（仅在density_estimate=False时使用）
quantile_threshold: 6.0 # 分位数约束阈值 C (Q_α >= C)
density_estimate: false # 是否使用密度估计版本（true使用密度估计，false使用nu）
h_n: 0.01               # 密度估计版本的分位数间隔（仅在density_estimate=true时使用）

# 拉格朗日乘子学习率
lambda_a: 1.0
lambda_b: 100.0
lambda_c: 0.6

# ======================
# DQC-AC 特有参数
# ======================
density_bandwidth: 0.01  # 密度估计带宽δ（计算Q(α±δ)用于密度f̂_Z = 2δ/(Q(α+δ)-Q(α-δ))）

# ======================
# 评估参数
# ======================
eval_episodes: 1000     # 评估时的采样次数

# ======================
# 输出设置
# ======================
output_dir: 'results'   # 结果保存目录

# ======================
# 理论分析参考值 (基于默认环境参数)
# ======================
# 环境参数: μ_base=1.0, k_mean=0.5, σ_base=0.1, k_std=5.0
# 折扣因子: γ=0.99, 共10步
# 累积系数: Σγ^t ≈ 9.56, √(Σγ^(2t)) ≈ 3.02
#
# 累积回报:
#   E[U] = (1 + 0.5r) × 9.56 = 9.56 + 4.78r
#   Std[U] = (0.1 + 5r) × 3.02 = 0.302 + 15.1r
#   Q_0.25[U] = E[U] - 0.674×Std[U] = 9.36 - 5.4r
#
# QPO (最大化分位数):
#   - 预期选择: r → 0 (最保守策略)
#   - 预期结果: Mean ≈ 9.56, Q_0.25 ≈ 9.36
#
# QCPO (最大化均值 s.t. Q_0.25 >= 6.0):
#   - 解 9.36 - 5.4r = 6.0 → r ≈ 0.62
#   - 预期结果: Mean ≈ 12.5, Q_0.25 ≈ 6.0
#
# 结论: QCPO均值提高约30%!
